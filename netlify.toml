# Netlify configuration for autolawnuk.com
# The repo IS the built site (static output generated by build.mjs in the source
# project) — no build command needed. Functions are bundled by Netlify at deploy.

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Daily site + affiliate-link health check (UTC). Short orchestration only —
# results go to function logs (Netlify UI → Logs → Functions).
[functions."health-check"]
  schedule = "@daily"
